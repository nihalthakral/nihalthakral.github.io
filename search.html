<!DOCTYPE html>
<html lang="en" translate="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Nihal Thakral</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Instrument Sans', sans-serif;
    background: #FAF9F7;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* NAV */
  nav {
    padding: 1.6rem 7%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #ebebeb;
  }
  .nav-name {
    font-size: 1rem;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }
  .nav-back {
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    font-size: 0.85rem;
    font-weight: 600;
    color: #888;
    text-decoration: none;
    transition: color 0.18s;
  }
  .nav-back:hover { color: #1a1a1a; }
  .nav-back svg { width: 14px; height: 14px; }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 4rem 5% 6rem;
    text-align: center;
  }

  /* HEADLINE */
  .headline-search {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(5rem, 20vw, 16rem);
    font-weight: 400;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #E8520A;
    display: block;
  }
  .headline-sub {
    font-family: 'Instrument Serif', serif;
    font-size: clamp(5rem, 20vw, 16rem);
    font-weight: 400;
    line-height: 0.92;
    letter-spacing: -0.03em;
    color: #000000;
    display: block;
    margin-top: 0.1em;
  }

  /* FORM */
  .form-wrap {
    margin-top: clamp(2.5rem, 6vw, 4.5rem);
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .input-row {
    display: flex;
    width: 100%;
    border: 1.5px solid #1a1a1a;
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .input-row:focus-within {
    border-color: #E8520A;
    box-shadow: 0 0 0 3px rgba(232, 82, 10, 0.12);
  }
  .input-row.error-shake {
    animation: shake 0.35s ease;
    border-color: #E8520A;
  }

  .input-row input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    padding: 0.95rem 1.2rem;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 1rem;
    font-weight: 500;
    color: #1a1a1a;
    letter-spacing: -0.01em;
  }
  .input-row input::placeholder {
    color: #c0bdb8;
    font-weight: 400;
  }

  .btn-search {
    flex-shrink: 0;
    border: none;
    border-left: 1.5px solid #1a1a1a;
    background: #1a1a1a;
    color: #fff;
    font-family: 'Instrument Sans', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 0 1.6rem;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    gap: 0.45rem;
  }
  .btn-search:hover { background: #E8520A; border-left-color: #E8520A; }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-search svg { width: 15px; height: 15px; }

  /* SPINNER inside button */
  .spinner {
    width: 15px;
    height: 15px;
    border: 2px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  .btn-search.loading .spinner { display: block; }
  .btn-search.loading .icon-search { display: none; }
  .btn-search.loading .btn-label { display: none; }

  /* ERROR */
  .error-msg {
    display: none;
    align-items: center;
    gap: 0.5rem;
    background: #fff1ec;
    border: 1px solid #f5c4b0;
    border-radius: 8px;
    padding: 0.7rem 1.1rem;
    font-size: 0.88rem;
    font-weight: 600;
    color: #c4400a;
    width: 100%;
  }
  .error-msg.visible { display: flex; }
  .error-msg svg { width: 15px; height: 15px; flex-shrink: 0; }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20%      { transform: translateX(-6px); }
    40%      { transform: translateX(6px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* FOOTER */
  footer {
    padding: 1.8rem 7%;
    border-top: 1px solid #ebebeb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .footer-name { font-size: 0.85rem; color: #aaa; }
  .footer-copy  { font-size: 0.82rem; color: #bbb; }

  @media (max-width: 600px) {
    nav { padding: 1.2rem 5%; }
    main { padding: 3rem 5% 5rem; }
    footer { padding: 1.5rem 5%; }
    .btn-label { display: none; }
    .btn-search { padding: 0 1rem; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="nav-name">Nihal Thakral</span>
  <a href="index.html" class="nav-back">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path d="M19 12H5M5 12l7-7M5 12l7 7"/>
    </svg>
    Back
  </a>
</nav>

<!-- MAIN -->
<main>
  <div>
    <span class="headline-search">Search</span>
    <span class="headline-sub">Your Id</span>
  </div>

  <div class="form-wrap">
    <div class="error-msg" id="errorMsg">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="errorText">incorrect id, try again.</span>
    </div>

    <div class="input-row" id="inputRow">
      <input
        type="text"
        id="idInput"
        placeholder="Enter your Id"
        autocomplete="off"
        autocorrect="off"
        spellcheck="false"
        autofocus
      >
      <button class="btn-search" id="searchBtn" onclick="handleSearch()">
        <div class="spinner"></div>
        <svg class="icon-search" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span class="btn-label">Search</span>
      </button>
    </div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <span class="footer-name">nihalthakral.trader@gmail.com</span>
  <span class="footer-copy">© 2026</span>
</footer>

<script>
  const input    = document.getElementById('idInput');
  const btn      = document.getElementById('searchBtn');
  const errorMsg = document.getElementById('errorMsg');
  const errorTxt = document.getElementById('errorText');
  const inputRow = document.getElementById('inputRow');

  // Allow Enter key
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSearch();
  });

  // Hide error when user starts typing again
  input.addEventListener('input', function() {
    errorMsg.classList.remove('visible');
    inputRow.classList.remove('error-shake');
  });

  async function handleSearch() {
    const id = input.value.trim();

    if (!id) {
      showError('please enter your id.');
      return;
    }

    // Set loading state
    btn.classList.add('loading');
    btn.disabled = true;
    errorMsg.classList.remove('visible');

    try {
      const url = 'user/' + encodeURIComponent(id) + '/download.html';
      const res = await fetch(url, { method: 'HEAD' });

      if (res.ok) {
        window.location.href = url;
      } else {
        showError('incorrect id, try again.');
      }
    } catch (err) {
      showError('incorrect id, try again.');
    } finally {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  function showError(msg) {
    errorTxt.textContent = msg;
    errorMsg.classList.add('visible');
    // Re-trigger shake animation
    inputRow.classList.remove('error-shake');
    void inputRow.offsetWidth; // reflow
    inputRow.classList.add('error-shake');
    input.focus();
  }
</script>

</body>
</html>
