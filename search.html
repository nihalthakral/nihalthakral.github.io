<?php
if ($_SERVER['REQUEST_METHOD'] === 'POST') {
    $id = trim($_POST['id'] ?? '');
    $error = '';

    if ($id !== '') {
        $safe = preg_replace('/[^a-zA-Z0-9_\-]/', '', $id);
        if ($safe === $id && $id !== '') {
            $folder = __DIR__ . '/user/' . $id;
            if (is_dir($folder) && file_exists($folder . '/index.html')) {
                header('Location: user/' . rawurlencode($id) . '/index.html');
                exit;
            } else {
                $error = 'incorrect id, try again.';
            }
        } else {
            $error = 'incorrect id, try again.';
        }
    } else {
        $error = 'please enter your id.';
    }
}
