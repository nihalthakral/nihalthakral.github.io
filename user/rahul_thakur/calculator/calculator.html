<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=980, user-scalable=no, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Rahul Thakur Calculator</title>
<meta name="google" content="notranslate" />
<meta http-equiv="Content-Language" content="hi" />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #EFEDE8;
  --surface: #FFFFFF;
  --surface2:#E8E5DF;
  --accent:  #1B5E42;
  --text:    #111110;`
  --text2:   #6A6560;
  --border:  #C8C3BC;
}

html {
  height: 100dvh;
  overflow: hidden;
  touch-action: manipulation;
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-text-size-adjust: 100%;
  user-select: none;
  -webkit-user-select: none;
  touch-action: manipulation;
}

/* ── HEADER ── */
header {
  flex-shrink: 0;
  width: 100%;
  background: var(--accent);
  padding: calc(env(safe-area-inset-top, 0px) + 1.5vh) 14px 1.5vh;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hicon {
  width: 11vh; height: 11vh;
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 1.5vh;
  display: flex; align-items: center; justify-content: center;
  font-size: 8vh;
  transition: font-size 0.3s ease;
}
.htext h1 {
  font-family: 'Baloo 2', sans-serif;
  font-size: 5vh;
  font-weight: 800;
  color: #fff;
  letter-spacing: -.3px;
  line-height: 1.1;
  transition: opacity 0.25s ease;
}

/* ── SCROLL / CONTENT AREA ── */
.scroll {
  flex: 1;
  min-height: 0;
  overflow: hidden;
  width: 100%;
  padding: 1.2vh 14px calc(env(safe-area-inset-bottom, 0px) + 1.5vh);
  display: flex;
  flex-direction: column;
}

/* ── VIEW CONTAINERS ── */
#view-input {
  display: flex;
  flex-direction: column;
  height: 100%;
  gap: 1vh;
}
#view-result {
  display: none;
  flex-direction: column;
  height: 100%;
  gap: 1.2vh;
}

/* ── SERVICE CARD ── */
.scard {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  border-radius: 2vh;
  border: 2px solid var(--border);
  padding: 1.2vh 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 0.8vh;
  transition: border-color .15s;
}

.stop { display: flex; align-items: center; }
.sinfo { display: flex; align-items: center; gap: 1.5vh; }
.semoji {
  width: 5.5vh; height: 5.5vh;
  border-radius: 1.2vh;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 3.8vh;
}
.ec  { background: #E6F4EA; }
.es  { background: #E3EFFE; }
.ecp { background: #FFF4E0; }
.eph { background: #FDEAEA; }

.sname { font-size: 3vh;   font-weight: 700; line-height: 1.2; }
.srate { font-size: 2.5vh; color: var(--text2); margin-top: 0.3vh; font-weight: 600; font-family: Arial, sans-serif; }

/* ── QTY ROW ── */
.qrow { display: flex; width: 100%; height: 7vh; }

.qbtn {
  width: 9vh; height: 100%;
  flex-shrink: 0;
  border: 3px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 5vh; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: background .08s, transform .07s;
  font-family: 'DM Sans', sans-serif; font-weight: 700;
}
.qbtn:first-child { border-radius: 1.5vh 0 0 1.5vh; border-right: none; }
.qbtn:last-child  { border-radius: 0 1.5vh 1.5vh 0; border-left:  none; }
.qbtn:active { background: #CFCBC4; transform: scale(.90); }

.qinp {
  height: 100%; width: 100%;
  border: 2px solid var(--border); border-left: none; border-right: none;
  background: var(--surface); color: var(--text);
  font-size: 5vh; font-family: 'Baloo 2', sans-serif; font-weight: 1000;
  text-align: center; outline: none; -moz-appearance: textfield;
  touch-action: manipulation;
  user-select: text; -webkit-user-select: text;
}
.qinp::-webkit-inner-spin-button,
.qinp::-webkit-outer-spin-button { -webkit-appearance: none; }

/* ── CONFIRM BUTTON ── */
.calcbtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: none; border-radius: 2vh;
  background: var(--accent); color: #fff;
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: opacity .08s, transform .07s;
  letter-spacing: 0.2px;
}
.calcbtn:active { opacity: .85; transform: scale(.98); }

/* ── SUMMARY CARD ── */
.sumcard {
  flex: 1;
  min-height: 0;
  background: var(--surface);
  border-radius: 2vh;
  border: 2px solid var(--border);
  padding: 2.5vh 16px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.bkrow {
  display: flex; justify-content: space-between;
  font-size: 2vh; color: var(--text2);
  padding: 0.7vh 0; font-weight: 400;
  font-family: Arial, sans-serif;
}
.bkrow span:last-child { font-weight: 600; color: var(--text); font-size: 2vh; }
.dvdr { border: none; border-top: 2px dashed var(--border); margin: 1.5vh 0; }

.frow {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--accent);
  border-radius: 1.5vh;
  padding: 2vh 18px; margin-top: 0.8vh;
}
.flbl { font-size: 4.5vh; font-weight: 700; color: rgba(255,255,255,.80); }
.fval { font-family: 'Baloo 2', sans-serif; font-size: 4.5vh; font-weight: 800; color: #fff; line-height: 1; }

/* ── EDIT BUTTON ── */
.ebtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: none; border-radius: 2vh;
  background: #C0392B; color: #fff;
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: opacity .08s, transform .07s;
}
.ebtn:active { opacity: .85; transform: scale(.98); }

/* ── REFRESH BUTTON ── */
.rbtn {
  flex-shrink: 0;
  width: 100%; height: 11vh;
  border: 2px solid var(--border); border-radius: 2vh;
  background: var(--surface); color: var(--text2);
  font-size: 4vh; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 10px;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation; user-select: none;
  transition: background .08s, transform .07s, color .08s;
}
.rbtn:active { background: #D0CCC5; color: var(--text); transform: scale(.98); }

/* ── CONFIRMATION POPUP ── */
.popup-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 20px;
  backdrop-filter: blur(2px);
  -webkit-backdrop-filter: blur(2px);
}
.popup-overlay.show {
  display: flex;
}
.popup-box {
  background: var(--surface);
  border-radius: 36px;
  border: 2px solid var(--border);
  padding: 60px 52px 48px;
  width: 100%;
  max-width: 860px;
  box-shadow: 0 12px 40px rgba(0,0,0,0.18);
  animation: popIn 0.18s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn {
  from { transform: scale(0.88); opacity: 0; }
  to   { transform: scale(1);    opacity: 1; }
}
.popup-icon {
  font-size: 120px;
  text-align: center;
  margin-bottom: 24px;
}
.popup-title {
  font-family: 'Baloo 2', sans-serif;
  font-size: 54px;
  font-weight: 800;
  color: var(--text);
  text-align: center;
  margin-bottom: 18px;
}
.popup-msg {
  font-size: 36px;
  color: var(--text2);
  text-align: center;
  line-height: 1.5;
  margin-bottom: 52px;
}
.popup-btns {
  display: flex;
  gap: 24px;
}
.popup-cancel {
  flex: 1;
  height: 120px;
  border: 2px solid var(--border);
  border-radius: 24px;
  background: var(--surface2);
  color: var(--text);
  font-size: 40px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: background .08s, transform .07s;
}
.popup-cancel:active { background: #CFCBC4; transform: scale(.96); }
.popup-ok {
  flex: 1;
  height: 120px;
  border: none;
  border-radius: 24px;
  background: #C0392B;
  color: #fff;
  font-size: 40px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  transition: opacity .08s, transform .07s;
}
.popup-ok:active { opacity: .85; transform: scale(.96); }

/* Responsive adjustments for very small screens */
@media screen and (max-width: 360px) {
  .popup-box { padding: 40px 28px 34px; }
  .popup-title { font-size: 42px; }
  .popup-msg { font-size: 28px; }
  .popup-cancel, .popup-ok { height: 96px; font-size: 32px; }
}
</style>

<!-- App Install -->
<meta name="theme-color" content="#FAF9F7">
<link rel="manifest" href="manifest.json">

<!-- Service Worker register karo -->
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('SW registered'))
      .catch(err => console.log('SW error:', err));
  }
</script>

<!-- beforeinstallprompt early capture — event miss na ho isliye -->
<script>
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    window._deferredPrompt = e;
  });
</script>

</head>
<body>

<script>
(function () {
  let deferredPrompt = null;

  const installScreen = document.createElement('div');
  installScreen.style.cssText = 'position:fixed;inset:0;z-index:99999;overflow-y:auto;';
  installScreen.innerHTML = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap');
      .is-wrap {
        display:flex;flex-direction:column;align-items:center;justify-content:center;
        min-height:100%;background:#FAF9F7;font-family:'DM Sans',sans-serif;
        text-align:center;padding:clamp(32px,8vw,64px) clamp(24px,8vw,64px);
        box-sizing:border-box;gap:0;
      }
      .is-identity { display:flex;flex-direction:column;align-items:center;margin-bottom:clamp(28px,6vw,48px); }
      .is-appicon {
        width:clamp(80px,22vw,130px);height:clamp(80px,22vw,130px);
        border-radius:clamp(18px,5vw,28px);margin-bottom:clamp(16px,4vw,24px);
        box-shadow:0 8px 32px rgba(0,0,0,0.25);background:rgba(255,255,255,0.12);
      }
      .is-title { color:#E8520A;font-size:clamp(26px,7vw,52px);font-weight:1000;margin:0 0 clamp(8px,2vw,12px);letter-spacing:-0.5px;line-height:1.1; }
      .is-desc { color:rgba(255,255,255,0.72);font-size:clamp(14px,3.8vw,22px);font-weight:500;line-height:1.4;max-width:420px; }
      .is-trust { display:flex;flex-direction:column;gap:clamp(10px,2.5vw,16px);width:100%;max-width:420px;margin-bottom:clamp(28px,6vw,44px); }
      .is-trust-row {
        display:flex;align-items:center;gap:clamp(10px,2.5vw,16px);
        background:rgba(255,255,255,0.10);border-radius:clamp(12px,3vw,18px);
        padding:clamp(10px,2.5vw,16px) clamp(14px,3.5vw,22px);text-align:left;
      }
      .is-trust-icon { font-size:clamp(20px,5vw,30px);flex-shrink:0;line-height:1; }
      .is-trust-text { color:#000000;font-size:clamp(13px,3.5vw,20px);font-weight:600;line-height:1.3; }
      .is-trust-text span { display:block;color:#000000;font-size:clamp(11px,2.8vw,16px);font-weight:400;margin-top:2px; }
      .is-btn {
        display:none;width:100%;max-width:420px;background:#E8520A;color:#FAF9F7;
        border:none;border-radius:100px;padding:clamp(14px,3.5vw,22px) clamp(32px,8vw,56px);
        font-size:clamp(17px,4.5vw,26px);font-weight:800;font-family:'DM Sans',sans-serif;
        cursor:pointer;transition:opacity 0.15s,transform 0.15s;letter-spacing:0.2px;
        box-shadow:0 4px 20px rgba(0,0,0,0.20);box-sizing:border-box;
      }
      .is-btn:active:not(:disabled){opacity:0.85;transform:scale(0.97);}
      .is-btn:disabled{cursor:default;opacity:0.80;}
      .is-chrome-note { margin-top:clamp(12px,3vw,18px);color:#000000;font-size:clamp(11px,2.8vw,16px);font-weight:400;max-width:360px;line-height:1.5; }
      .is-dots { display:inline-flex;align-items:center;gap:clamp(5px,1.5vw,9px);height:1em;vertical-align:middle; }
      .is-dots span {
        width:clamp(7px,2vw,11px);height:clamp(7px,2vw,11px);background:#1B5E42;
        border-radius:50%;display:inline-block;animation:is-dot-blink 1.2s infinite both;
      }
      .is-dots span:nth-child(1){animation-delay:0s;}
      .is-dots span:nth-child(2){animation-delay:0.3s;}
      .is-dots span:nth-child(3){animation-delay:0.6s;}
      @keyframes is-dot-blink {
        0%,80%,100%{opacity:0.15;transform:scale(0.8);}
        40%{opacity:1;transform:scale(1.2);}
      }
    </style>

    <div class="is-wrap">
      <div class="is-identity">
        <img class="is-appicon" src="./icon-192.png" alt="App Icon" />
        <h1 class="is-title">Rahul Thakur<br>Calculator</h1>
        <p class="is-desc">Do Maths easily without any mistake.</p>
      </div>
      <div class="is-trust">
        <div class="is-trust-row">
          <div class="is-trust-icon">❌</div>
          <div class="is-trust-text">Use without Internet<span>one time installation</span></div>
        </div>
        <div class="is-trust-row">
          <div class="is-trust-icon">🔒</div>
          <div class="is-trust-text">No Data Collect<span>No Account, No Login</span></div>
        </div>
        <div class="is-trust-row">
          <div class="is-trust-icon">⬇️</div>
          <div class="is-trust-text">Size = Less than 1 MB<span>Install in Few Seconds</span></div>
        </div>
      </div>
      <button id="is-btn" class="is-btn">?</button>
      <p class="is-chrome-note">Directly Install from Google Chrome</p>
    </div>
  `;
  document.body.appendChild(installScreen);

  // ── JS INLINE SIZING — CSS ko bypass karta hai, koi override nahi kar sakta ──
  function applyMobileSizing() {
    var W = window.innerWidth;
    if (W >= 600) return; // PC par kuch nahi karna
    var s = installScreen;

    // Wrap: padding bilkul kam — poora space content ke liye
    var wrap = s.querySelector('.is-wrap');
    if (wrap) {
      wrap.style.padding = '10px 8px';
      wrap.style.justifyContent = 'flex-start';
    }

    // Identity block
    var identity = s.querySelector('.is-identity');
    if (identity) { identity.style.marginBottom = '14px'; identity.style.width = '100%'; }

    // App icon: viewport width ka 32%
    var icon = s.querySelector('.is-appicon');
    if (icon) {
      var sz = Math.round(W * 0.32) + 'px';
      icon.style.width = sz; icon.style.height = sz;
      icon.style.borderRadius = '24px'; icon.style.marginBottom = '10px';
    }

    // Title: viewport width ka 13%
    var title = s.querySelector('.is-title');
    if (title) { title.style.fontSize = Math.round(W * 0.13) + 'px'; title.style.marginBottom = '6px'; }

    // Description
    var desc = s.querySelector('.is-desc');
    if (desc) { desc.style.fontSize = Math.round(W * 0.055) + 'px'; desc.style.maxWidth = '100%'; }

    // Trust container
    var trust = s.querySelector('.is-trust');
    if (trust) { trust.style.gap = '8px'; trust.style.maxWidth = '100%'; trust.style.marginBottom = '12px'; }

    // Trust rows
    s.querySelectorAll('.is-trust-row').forEach(function (row) {
      row.style.borderRadius = '14px'; row.style.padding = '11px 12px'; row.style.gap = '12px';
    });

    // Trust icons: viewport width ka 9%
    s.querySelectorAll('.is-trust-icon').forEach(function (ic) {
      ic.style.fontSize = Math.round(W * 0.09) + 'px';
    });

    // Trust text + subtext
    s.querySelectorAll('.is-trust-text').forEach(function (t) {
      t.style.fontSize = Math.round(W * 0.060) + 'px';
      var span = t.querySelector('span');
      if (span) { span.style.fontSize = Math.round(W * 0.048) + 'px'; span.style.marginTop = '3px'; }
    });

    // Button
    var btn = document.getElementById('is-btn');
    if (btn) {
      btn.style.maxWidth = '100%';
      btn.style.padding = Math.round(W * 0.05) + 'px ' + Math.round(W * 0.08) + 'px';
      btn.style.fontSize = Math.round(W * 0.075) + 'px';
    }

    // Chrome note
    var note = s.querySelector('.is-chrome-note');
    if (note) { note.style.fontSize = Math.round(W * 0.045) + 'px'; note.style.marginTop = '8px'; note.style.maxWidth = '100%'; }
  }

  // ── Display Toggle ──
  function applyMode() {
    var isPWA = window.matchMedia('(display-mode: standalone)').matches
                || window.navigator.standalone === true;
    if (isPWA) {
      installScreen.style.display = 'none';
      Array.from(document.body.children).forEach(function (el) {
        if (el !== installScreen) el.style.display = '';
      });
    } else {
      installScreen.style.display = 'block';
      Array.from(document.body.children).forEach(function (el) {
        if (el !== installScreen) el.style.display = 'none';
      });
      applyMobileSizing();
    }
  }

  // ── Button States ──
  function setBtn(type) {
    var btn = document.getElementById('is-btn');
    if (!btn) return;
    btn.disabled = false;
    btn.style.display = 'inline-block';
    if (type === 'loading') {
      btn.disabled  = true;
      btn.innerHTML = '<span class="is-dots"><span></span><span></span><span></span></span>';
      btn.onclick   = null;
    } else if (type === 'install') {
      btn.innerHTML = 'Install';
      btn.onclick = async function () {
        if (!deferredPrompt) return;
        btn.disabled  = true;
        btn.innerHTML = '<span class="is-dots"><span></span><span></span><span></span></span>';
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          deferredPrompt = null;
        } else {
          btn.disabled  = false;
          btn.innerHTML = 'Install';
        }
      };
    } else if (type === 'installed') {
      btn.innerHTML = 'App Installed ✅';
      btn.disabled  = true;
      btn.onclick   = null;
    } else {
      btn.innerHTML = '🔄&nbsp;&nbsp;Try Again';
      btn.disabled  = false;
      btn.onclick   = function () { window.location.reload(); };
    }
    applyMobileSizing(); // har button change ke baad re-apply
  }

  // ── Init ──
  applyMode();
  window.matchMedia('(display-mode: standalone)').addEventListener('change', applyMode);
  window.addEventListener('resize', applyMobileSizing);

  const swAlreadyActive = !!(navigator.serviceWorker && navigator.serviceWorker.controller);
  if (window._deferredPrompt) {
    deferredPrompt = window._deferredPrompt;
    window._deferredPrompt = null;
  }
  if (swAlreadyActive) {
    if (deferredPrompt) {
      setBtn('install');
    } else {
      setBtn('installed');
    }
  } else {
    const btn = document.getElementById('is-btn');
    if (btn) { btn.style.display = 'inline-block'; }
    setBtn('loading');
    let promptTimer = setTimeout(function () {
      if (!deferredPrompt) setBtn('refresh');
    }, 10000);
    window.addEventListener('beforeinstallprompt', function (e) {
      clearTimeout(promptTimer);
      e.preventDefault();
      deferredPrompt = e;
      setBtn('install');
    });
  }
  window.addEventListener('beforeinstallprompt', function (e) {
    if (swAlreadyActive) {
      e.preventDefault();
      deferredPrompt = e;
      setBtn('install');
    }
  });
  window.addEventListener('appinstalled', function () {
    deferredPrompt = null;
    setBtn('installed');
  });

})();
</script>

<div class="scroll">

  <!-- INPUT VIEW -->
  <div id="view-input">

    <div class="scard" id="c-pc">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji ec">📄</div>
          <div><div class="sname">Photo Copy</div><div class="srate">₹3 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'pc',-1);startHold('pc',-1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-pc" value="0" oninput="sq('pc',this.value)" onblur="sb('pc')" onfocus="sf('pc')" disabled>
        <button class="qbtn" ontouchstart="ch(event,'pc',1);startHold('pc',1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-sp">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji es">🖨️</div>
          <div><div class="sname">Saada Printout</div><div class="srate">₹5 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'sp',-1);startHold('sp',-1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-sp" value="0" oninput="sq('sp',this.value)" onblur="sb('sp')" onfocus="sf('sp')" disabled>
        <button class="qbtn" ontouchstart="ch(event,'sp',1);startHold('sp',1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-cp">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji ecp">🌈</div>
          <div><div class="sname">Colored Printout</div><div class="srate">₹10 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'cp',-1);startHold('cp',-1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-cp" value="0" oninput="sq('cp',this.value)" onblur="sb('cp')" onfocus="sf('cp')" disabled>
        <button class="qbtn" ontouchstart="ch(event,'cp',1);startHold('cp',1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">+</button>
      </div>
    </div>

    <div class="scard" id="c-ph">
      <div class="stop">
        <div class="sinfo">
          <div class="semoji eph">🎨</div>
          <div><div class="sname">Colored Photocopy</div><div class="srate">₹10 per page</div></div>
        </div>
      </div>
      <div class="qrow">
        <button class="qbtn" ontouchstart="ch(event,'ph',-1);startHold('ph',-1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">−</button>
        <input class="qinp" type="number" inputmode="numeric" min="0" max="999" id="q-ph" value="0" oninput="sq('ph',this.value)" onblur="sb('ph')" onfocus="sf('ph')" disabled>
        <button class="qbtn" ontouchstart="ch(event,'ph',1);startHold('ph',1)" ontouchend="endHold()" ontouchcancel="endHold()" onclick="return false">+</button>
      </div>

    <button class="calcbtn" ontouchstart="" onclick="showResult()">Confirm</button>

  <div id="view-result">

    <div class="sumcard">
      <div id="bk"></div>
      <div class="dvdr"></div>

        <span class="flbl">Total</span>
        <span class="fval" id="fin">₹0</span>
      </div>
    </div>

    <button class="ebtn" ontouchstart="" onclick="goBack()">✏️&nbsp; Edit</button>
    <button class="rbtn" ontouchstart="" onclick="showRefreshPopup()">🔄&nbsp; New</button>

<script>
const SVC = [
  {id:'pc', rate:3,  name:'Photo Copy'},
  {id:'sp', rate:5,  name:'Saada Printout'},
  {id:'cp', rate:10, name:'Colored Printout'},
  {id:'ph', rate:10, name:'Colored Photocopy'},
];
const Q = {pc:0, sp:0, cp:0, ph:0};

/* ── HOLD-TO-REPEAT ── */
let _holdTimer    = null;
let _holdInterval = null;

function startHold(id, d) {
  _holdTimer = setTimeout(function() {
    _holdInterval = setInterval(function() {
      Q[id] = Math.max(0, Q[id] + d);
      document.getElementById('q-' + id).value = Q[id];
    }, 80);
  }, 500);
}

function endHold() {
  clearTimeout(_holdTimer);
  clearInterval(_holdInterval);
  _holdTimer    = null;
  _holdInterval = null;
}

function ch(e, id, d) {
  if (e) e.preventDefault();
  Q[id] = Math.max(0, Q[id] + d);
  document.getElementById('q-'+id).value = Q[id];
}
function sq(id, v) {
  Q[id] = Math.max(0, parseInt(v)||0);
}
function sf(id) {
  const inp = document.getElementById('q-'+id);
  if (inp.value === '0') inp.value = '';
}
function sb(id) {
  const inp = document.getElementById('q-'+id);
  if (inp.value === '' || inp.value === null) {
    inp.value = 0; Q[id] = 0;
  }
}

function showResult() {
  let total = 0;
  const items = [];
  SVC.forEach(s => {
    const q = Q[s.id], amt = q * s.rate;
    total += amt;
    if (q > 0) items.push({ name: s.name + ' (₹' + s.rate + ' × ' + q + ')', amt: '₹' + amt });
  });
  document.getElementById('fin').textContent = '₹' + total;
  document.getElementById('bk').innerHTML = items.length
    ? items.map(i => `<div class="bkrow"><span>${i.name}</span><span>${i.amt}</span></div>`).join('')
    : '<div class="bkrow"><span style="color:var(--border)">Koi item nahi</span></div>';

  document.getElementById('hicon').textContent = '🎉';
  document.getElementById('htitle').innerHTML = 'Thanks for <br> Shopping!';

  document.getElementById('view-input').style.display  = 'none';
  document.getElementById('view-result').style.display = 'flex';
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('hicon').textContent = '🛍️';
  document.getElementById('htitle').innerHTML = 'Rahul Thakur <br> Calculator';
  document.getElementById('view-input').style.display  = 'flex';
  document.getElementById('view-result').style.display = 'none';
}

function reset() {
  SVC.forEach(s => {
    Q[s.id] = 0;
    document.getElementById('q-'+s.id).value = 0;
  });

  document.getElementById('hicon').textContent = '🛍️';
  document.getElementById('htitle').innerHTML = 'Rahul Thakur <br> Calculator';

  document.getElementById('view-input').style.display  = 'flex';
  document.getElementById('view-result').style.display = 'none';
}

function showRefreshPopup() {
  document.getElementById('refreshPopup').classList.add('show');
}
function closeRefreshPopup() {
  document.getElementById('refreshPopup').classList.remove('show');
}
function confirmReset() {
  closeRefreshPopup();
  reset();
}

document.getElementById('refreshPopup').addEventListener('click', function(e) {
  if (e.target === this) closeRefreshPopup();
});

document.addEventListener('touchmove', e => { if (e.touches.length > 1) e.preventDefault(); }, {passive: false});
document.addEventListener('gesturestart', e => e.preventDefault());
let lastTap = 0;
document.addEventListener('touchend', function(e) {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });
</script>

<!-- Free Trial / Life Time -->
<script>
const EXPIRY_DATE = "2030-12-31";

function checkFreeTier() {
  const today = new Date();
  const expiry = new Date(EXPIRY_DATE);

  today.setHours(0, 0, 0, 0);
  expiry.setHours(0, 0, 0, 0);

  if (today > expiry) {
    const expired = document.createElement('div');
    expired.style.cssText = 'position:fixed;inset:0;z-index:999999;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-family:Arial,sans-serif;text-align:center;padding:40px;';
    expired.innerHTML = '<div><h1 style="color:#ff2222;font-size:3rem;margin-bottom:16px;">🚫 Free Trial Ends</h1><p style="color:#ff5555;font-size:1.4rem;">Purchase for Lifetime</p></div>';
    document.body.appendChild(expired);
    clearInterval(trialInterval);
  }
}

checkFreeTier();
const trialInterval = setInterval(checkFreeTier, 30000);
</script>
